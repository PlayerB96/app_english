services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: caja_rapida_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
    networks:
      - caja_rapida

  mysql:
    image: mysql:8.4
    container_name: caja_rapida_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: ln1_caja_rapida
      MYSQL_USER: caja_rapida
      MYSQL_PASSWORD: secret
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - caja_rapida

  redis:
    image: redis:7-alpine
    container_name: caja_rapida_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - caja_rapida

volumes:
  mysql_data:
  redis_data:

networks:
  caja_rapida:
    driver: bridge
