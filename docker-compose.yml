services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: caja_rapida_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_CONNECTION: sqlsrv
      DB_HOST: sqlserver
      DB_PORT: 1433
      DB_DATABASE: ln1_caja_rapida
      DB_USERNAME: sa
      DB_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
      DB_ENCRYPT: "yes"
      DB_TRUST_SERVER_CERTIFICATE: "true"
      REDIS_HOST: redis
    networks:
      - caja_rapida

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: caja_rapida_sqlserver
    restart: unless-stopped
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong!Passw0rd}
      MSSQL_PID: Developer
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./docker/sql:/scripts:ro
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - caja_rapida

  redis:
    image: redis:7-alpine
    container_name: caja_rapida_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - caja_rapida

volumes:
  sqlserver_data:
  redis_data:

networks:
  caja_rapida:
    driver: bridge
