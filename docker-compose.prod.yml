# Producción: app contra PostgreSQL externo (sin contenedor postgres).
# DB_HOST y APP_URL se leen del .env local de cada servidor.
#
# Uso:
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: app_english_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    networks:
      - app_english

networks:
  app_english:
    driver: bridge
